<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeigerVids - Post, Watch, Enjoy</title>
    <style>
        body {
            background-color: #312c42;
        }
        .childcenterh {
            display: flex;
            justify-content: center;
        }
        .selfcenterh {
            display: block;
            margin: 0 auto;
        }
        #suggestions {
            display: flex;
            flex-direction: column;
            align-items: stretch;

            width: fit-content;
            margin: 0 auto;

            border: 2px solid whitesmoke;
        }
        #suggestions > div {
            background-color: #312c42;
            color: whitesmoke;
            font-size: large;
            margin: 4px;
        }
        #filename {
            background-color: #312c42;
            color: whitesmoke;
            font-size: large;
        }
        #submit {
            background-color: #312c42;
            color: whitesmoke;
            font-size: large;
            border: none;
        }
        #searchbar {
            display: flex;
            justify-content: center;

            width: fit-content;
            margin: 0 auto;

            border: 2px solid whitesmoke;
        }
        #suggestions > div:hover {
            background-color: #444;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="searchbar">
        <input id="filename" type="text" placeholder="Find video..." maxlength="40">
        <button onclick="submitFilename()" id="submit">Search</button>
    </div>
    <div id="suggestions"></div>

    <video id="currentvideo" class="selfcenterh" controls loop></video>

    <script>
    const VIDEO_BASE =
        "https://yfeaeizopiqnfodrtttw.supabase.co/storage/v1/object/public/videos/";

    const pFilenames = document.getElementById("filenames");
    const inputFilename = document.getElementById("filename");
    const videoCurrentVideo = document.getElementById("currentvideo");
    const divSuggestions = document.getElementById("suggestions");
    let names;

    const getVideo = (name) => VIDEO_BASE + name + ".mp4";

    function submitFilename() {
        divSuggestions.innerHTML = "";
        videoCurrentVideo.src = getVideo(inputFilename.value);
        videoCurrentVideo.load();
    }

    function searchVideos() {
        const query = inputFilename.value.toLowerCase();

        const filtered = names.filter(name =>
            name.toLowerCase().includes(query)
        );

        divSuggestions.innerHTML = filtered.map(name =>
            `<div class="suggestion" onclick="selectVideo('${name}')">${name}</div>`
        ).join("");
    }

    function selectVideo(name) {
        inputFilename.value = name;
        submitFilename();
        divSuggestions.innerHTML = "";
    }

    inputFilename.addEventListener("input", searchVideos);

    (async () => {
    const res = await fetch("https://yfeaeizopiqnfodrtttw.supabase.co/storage/v1/object/list/videos", {
        method: "POST",
        headers: {
            apikey: "sb_publishable_S6JK_c0Ig6P6iD8mI0wo5w_sC0ve3M-",
            Authorization: "Bearer sb_publishable_S6JK_c0Ig6P6iD8mI0wo5w_sC0ve3M-",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            prefix: "",
            limit: 100,
            offset: 0
        })
    });

    const data = await res.json();
    names = data.map(file => file.name.replace(".mp4", ""));
    })();
    </script>
</body>
</html>
